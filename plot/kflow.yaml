name: bet2026-plot
description: Combine selected BET 2026 smoke outputs and create model exploration plots.
command: bash run.sh
docker_image: ghcr.io/pacificcommunity/bet2026-flow:latest
resources:
  cpus: 2
  memory: 12GB
  disk: 5GB
output_patterns:
  - outputs/**
job_config:
  optional:
    - RUN_LABEL
    - JOB_KEY
    - JOB_TITLE
    - JOB_DESCRIPTION
    - MODEL_KEY
    - MODEL_TOKEN
    - MODEL_NAME
    - BASE_MODEL_KEY
    - CHANGE_TOKEN
    - CHANGE_GROUP
    - CHANGE_SUMMARY
    - INPUT_TASK
    - INPUT_KEY
    - PLOT_TITLE
    - PLOT_BACKEND
    - MFCLSHINY_SCRIPT
    - MFCLKIT_SCRIPT
    - TREE_RESPONSE
    - TREE_PREDICTORS
