name: tuna-flow-report
description: Render a Quarto report from selected tuna assessment plot outputs.
command: bash run.sh
docker_image: ghcr.io/pacificcommunity/tuna-flow:latest
resources:
  cpus: 2
  memory: 12GB
  disk: 5GB
output_patterns:
  - outputs/**
job_config:
  optional:
    - RUN_LABEL
    - FLOW_SPECIES
    - FLOW_SPECIES_LABEL
    - FLOW_ASSESSMENT_YEAR
    - FLOW_TASK_PREFIX
    - JOB_KEY
    - JOB_TITLE
    - JOB_DESCRIPTION
    - MODEL_KEY
    - MODEL_TOKEN
    - MODEL_NAME
    - BASE_MODEL_KEY
    - CHANGE_TOKEN
    - CHANGE_GROUP
    - CHANGE_SUMMARY
    - INPUT_TASK
    - INPUT_KEY
    - REPORT_TITLE
    - REPORT_FILE_STEM
