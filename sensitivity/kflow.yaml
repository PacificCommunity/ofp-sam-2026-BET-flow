name: tuna-flow-sensitivity
description: Run one tuna assessment sensitivity model job from a selected base job.
command: bash run.sh
docker_image: ghcr.io/pacificcommunity/tuna-flow:latest
resources:
  cpus: 2
  memory: 12GB
  disk: 5GB
output_patterns:
  - outputs/**
job_config:
  optional:
    - RUN_LABEL
    - FLOW_SPECIES
    - FLOW_SPECIES_LABEL
    - FLOW_ASSESSMENT_YEAR
    - FLOW_TASK_PREFIX
    - JOB_KEY
    - JOB_TITLE
    - JOB_DESCRIPTION
    - MODEL_KEY
    - MODEL_TOKEN
    - MODEL_NAME
    - BASE_MODEL_KEY
    - CHANGE_TOKEN
    - CHANGE_GROUP
    - CHANGE_SUMMARY
    - INPUT_VARIANT
    - INPUT_TASK
    - INPUT_KEY
    - SOURCE_REPO
    - SOURCE_REF
    - USE_FLOW_SOURCE
    - USE_LOCAL_SOURCE
    - MFCL_BACKEND
    - BACKEND_SCRIPT
    - BACKEND_COMMAND
    - PROGRAM_PATH
    - FLOW_MFCL_PROGRAM
    - MAKE_TARGETS
    - MAKE_VARS
    - BASE_DIR
    - FLOW_BASE_INPUT_DIR
    - MODEL_DIR
    - PATCH_SCRIPT
    - PATCH_INPUT_DIR
    - PATCH_OUTPUT_DIR
    - PATCH_ARGS
    - BASE_SEED_GLOB
    - BASE_SEED_COPY_TO
    - COLLECT_PATHS
    - MFCLKIT_SCRIPT
